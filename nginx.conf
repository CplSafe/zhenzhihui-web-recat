# 帧智汇前端 nginx —— 同源反代,把 vite dev 的 proxy 规则搬到生产静态托管。
# 容器以 host 网络运行(见 docker-compose.local.yml),故上游写 127.0.0.1。
#   /api /auth /zzh-api → 业务后端(127.0.0.1:9000)
#   /aimodel* → 内网 vLLM/VL/图片模型(172.10.0.102:800x)
#   其余 → SPA(history 路由回退 index.html)
# 注:本地用 ZZH_DEV_AUTH_BYPASS=true 免登录,故不含 /sso /deepauth(走 SSO 时再加)。

server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 5g;   # 素材上传上限,和后端 ZZH_ASSET_MAX_UPLOAD_BYTES 对齐

    # ---- SPA 静态 ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 业务后端 ----
    location /api/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # /ai/responses 是 SSE 长响应:关缓冲 + 长超时,避免被截断
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /zzh-api/ {
        rewrite ^/zzh-api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- DeepAuth 认证服务(本地克隆,容器发布在 8091)----
    # 剥掉 /deepauth 前缀:deepauth 内部在根路径服务,但按 issuer=.../deepauth 生成对外 URL。
    location /deepauth/ {
        rewrite ^/deepauth/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- 内网 AI 模型(vLLM / VL / 图片生成)----
    # 若这些模型服务未启动,相关"AI 润色/图片解析/自动生成"功能会失败,不影响其它页面。
    location /aimodel-vl/ {
        rewrite ^/aimodel-vl/(.*) /$1 break;
        proxy_pass http://172.10.0.102:8003;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
    location /aimodel-img/ {
        rewrite ^/aimodel-img/(.*) /$1 break;
        proxy_pass http://172.10.0.102:8004;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
    location /aimodel/ {
        rewrite ^/aimodel/(.*) /$1 break;
        proxy_pass http://172.10.0.102:8001;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
}
