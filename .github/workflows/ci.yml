name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Checks, tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency security audit
        run: npm run audit:ci

      - name: Formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test typecheck
        run: npm run test:typecheck

      - name: End-to-end typecheck
        run: npm run test:e2e:typecheck

      - name: Strict lint
        run: npm run lint:strict

      - name: Unit and component tests
        run: npm run test:coverage

      - name: Full-source coverage floor
        run: npm run test:coverage:all

      - name: Build
        run: npm run build

      - name: Client bundle policy
        run: npm run check:bundle

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Cross-browser end-to-end tests
        run: npm run test:e2e:ci

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/gated/
            coverage/all/
          retention-days: 14

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
